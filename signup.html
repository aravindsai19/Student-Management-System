<html>

<head>

<title>Sign Up</title>

<style>

body
{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#7B0000,#B22222,#FFD700);
}

.signupbox
{
    width:550px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 0px 25px black;
    transition:.4s;
}

.signupbox:hover
{
    transform:scale(1.01);
    box-shadow:0px 0px 30px gold;
}

h1
{
    text-align:center;
    color:#8B0000;
    text-shadow:2px 2px 5px gold;
    margin-bottom:30px;
}

table
{
    width:100%;
}

td
{
    padding:10px;
    color:#8B0000;
    font-size:18px;
    font-weight:bold;
}

input[type=text],
input[type=password],
input[type=email]
{
    width:100%;
    height:40px;
    border:2px solid gold;
    border-radius:10px;
    padding-left:10px;
    font-size:16px;
    transition:.3s;
}

input[type=text]:focus,
input[type=password]:focus,
input[type=email]:focus
{
    border:2px solid #8B0000;
    box-shadow:0px 0px 12px gold;
    outline:none;
}

.gender
{
    color:#8B0000;
    font-size:17px;
    font-weight:bold;
}

input[type=radio]
{
    transform:scale(1.2);
}

input[type=submit]
{
    width:180px;
    height:45px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#8B0000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
}

input[type=submit]:hover
{
    background:#8B0000;
    color:#FFD700;
    transform:scale(1.15);
    box-shadow:0px 0px 20px gold;
}

.links
{
    text-align:center;
    margin-top:20px;
}

.links a
{
    text-decoration:none;
    color:#8B0000;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

.links a:hover
{
    color:#FFD700;
    text-shadow:0px 0px 8px red;
}

.footer
{
    text-align:center;
    color:white;
    margin:20px;
    font-size:15px;
}

</style>

</head>

<body>

<div class="signupbox">

<h1>Create New Account</h1>

<form action="./signser" method="post">

<table>

<tr>
<td>Full Name</td>
<td><input type="text" name="uname" required></td>
</tr>

<tr>
<td>Contact Number</td>
<td><input type="text" name="num" required></td>
</tr>

<tr>
<td>Age</td>
<td><input type="text" name="uage" required></td>
</tr>

<tr>
<td>Gender</td>
<td class="gender">

<input type="radio" name="ugender" value="male" required> Male

&nbsp;&nbsp;

<input type="radio" name="ugender" value="female"> Female

&nbsp;&nbsp;

<input type="radio" name="ugender" value="Others"> Others

</td>
</tr>

<tr>
<td>Email</td>
<td><input type="email" name="umail" required></td>
</tr>

<tr>
<td>Username</td>
<td><input type="text" name="use" required></td>
</tr>

<tr>
<td>Password</td>
<td><input type="password" name="pass" required></td>
</tr>

<tr>
<td>Confirm Password</td>
<td><input type="password" name="pass1" required></td>
</tr>

<tr>
<td colspan="2" align="center">

<br>

<input type="submit" value="SIGN UP">

</td>
</tr>

</table>

</form>

<div class="links">

<a href="./index.html">Already have an account? Login</a>

</div>

</div>

<div class="footer">
Designed by Aravind
</div>

</body>

</html>
