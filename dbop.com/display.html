<html>

<head>

<title>Dashboard</title>

<style>

body
{
    margin:0;
    padding:0;
    background:linear-gradient(to right,#7B0000,#B22222,#FFD700);
    font-family:Arial,Helvetica,sans-serif;
}

.container
{
    width:80%;
    margin:40px auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0px 0px 20px black;
    text-align:center;
}

h1
{
    color:#7B0000;
    font-size:40px;
}

h3
{
    color:#B22222;
}

.card
{
    width:220px;
    height:120px;
    display:inline-block;
    margin:20px;
    border-radius:12px;
    color:white;
    font-size:20px;
    font-weight:bold;
    box-shadow:0px 0px 10px black;
}

.red
{
    background:#8B0000;
}

.gold
{
    background:#D4AF37;
    color:black;
}

.orange
{
    background:#CD5C5C;
}

.green
{
    background:#2E8B57;
}

.value
{
    font-size:35px;
    margin-top:20px;
}

.footer
{
    margin-top:40px;
    color:#7B0000;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🎓 STUDENT DASHBOARD</h1>

<h3>Welcome to Student Database Management System</h3>

<div class="card red">
Total Students
<div class="value">56</div>
</div>

<div class="card gold">
Highest Marks
<div class="value">295</div>
</div>

<div class="card orange">
Lowest Marks
<div class="value">121</div>
</div>

<div class="card green">
Branches
<div class="value">4</div>
</div>

<div class="footer">

Developed using HTML • Servlets • JDBC • Oracle Database

</div>

</div>

</body>

</html>
