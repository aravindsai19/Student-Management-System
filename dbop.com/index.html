<html>
<head>
<title>DBase Operations</title>

<style>

body
{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#7B0000,#B22222,#FFD700);
    height:100vh;
}

.loginbox
{
    width:420px;
    background:white;
    margin:80px auto;
    padding:35px;
    border-radius:20px;
    box-shadow:0px 0px 25px black;
    transition:.4s;
}

.loginbox:hover
{
    transform:scale(1.02);
    box-shadow:0px 0px 30px gold;
}

h1
{
    text-align:center;
    color:#8B0000;
    margin-bottom:30px;
    text-shadow:2px 2px 4px gold;
}

table
{
    width:100%;
}

td
{
    padding:10px;
    font-size:18px;
    font-weight:bold;
    color:#8B0000;
}

input[type=text],
input[type=password]
{
    width:100%;
    height:40px;
    border-radius:10px;
    border:2px solid #FFD700;
    font-size:16px;
    padding-left:10px;
    transition:.3s;
}

input[type=text]:focus,
input[type=password]:focus
{
    border:2px solid #8B0000;
    box-shadow:0px 0px 12px gold;
    outline:none;
}

input[type=submit]
{
    width:170px;
    height:45px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#8B0000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
}

input[type=submit]:hover
{
    background:#8B0000;
    color:#FFD700;
    transform:scale(1.15);
    box-shadow:0px 0px 20px gold;
}

.links
{
    text-align:center;
    margin-top:20px;
}

.links a
{
    text-decoration:none;
    color:#8B0000;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

.links a:hover
{
    color:#FFD700;
    text-shadow:0px 0px 8px red;
}

.footer
{
    text-align:center;
    color:white;
    margin-top:20px;
    font-size:15px;
}

</style>

</head>

<body>

<div class="loginbox">

<h1>DBase Operations</h1>

<form action="./logser" method="post">

<table>

<tr>
<td>User Name</td>
<td>
<input type="text" name="uname" required>
</td>
</tr>

<tr>
<td>Password</td>
<td>
<input type="password" name="pass" required>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<br>
<input type="submit" value="LOGIN" name="sub">
</td>
</tr>

</table>

</form>

<div class="links">

<a href="./signup.html">Create New Account</a>

<br><br>

<a href="#">Forgot Password?</a>

</div>

</div>

<div class="footer">
Designed by Aravind
</div>

</body>
</html>
