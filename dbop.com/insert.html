<html>

<head>

<title>Insert Student Details</title>

<style>

body
{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#7B0000,#B22222,#FFD700);
}

.insertbox
{
    width:650px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 0px 25px black;
    transition:.4s;
}

.insertbox:hover
{
    transform:scale(1.01);
    box-shadow:0px 0px 30px gold;
}

h1
{
    text-align:center;
    color:#8B0000;
    text-shadow:2px 2px 5px gold;
    margin-bottom:25px;
}

table
{
    width:100%;
}

td
{
    padding:10px;
    color:#8B0000;
    font-size:18px;
    font-weight:bold;
}

input[type=text]
{
    width:100%;
    height:40px;
    border:2px solid gold;
    border-radius:10px;
    padding-left:10px;
    font-size:16px;
    transition:.3s;
}

input[type=text]:focus
{
    border:2px solid #8B0000;
    box-shadow:0px 0px 12px gold;
    outline:none;
}

input[type=submit]
{
    width:180px;
    height:45px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#8B0000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
}

input[type=submit]:hover
{
    background:#8B0000;
    color:#FFD700;
    transform:scale(1.15);
    box-shadow:0px 0px 20px gold;
}

</style>

</head>

<body>

<div class="insertbox">

<h1>Insert Student Details</h1>

<form action="./inser" method="post">

<table>

<tr>
<td>Student Name</td>
<td><input type="text" name="t2" required></td>
</tr>

<tr>
<td>Branch</td>
<td><input type="text" name="t3" required></td>
</tr>

<tr>
<td>Subject 1 Marks</td>
<td><input type="text" name="m1" required></td>
</tr>

<tr>
<td>Subject 2 Marks</td>
<td><input type="text" name="m2" required></td>
</tr>

<tr>
<td>Subject 3 Marks</td>
<td><input type="text" name="m3" required></td>
</tr>

<tr>
<td colspan="2" align="center">

<br>

<input type="submit" value="INSERT">

</td>
</tr>

</table>

</form>

</div>

</body>

</html>
