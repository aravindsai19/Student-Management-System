<html>

<head>

<title>Search Student</title>

<style>

body
{
    margin:0;
    padding:0;
    background:linear-gradient(to right,#7B0000,#B22222,#FFD700);
    font-family:Arial,Helvetica,sans-serif;
}

.container
{
    width:500px;
    margin:100px auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0px 0px 20px black;
}

h1
{
    color:#7B0000;
    text-align:center;
    margin-bottom:30px;
}

table
{
    width:100%;
    font-size:18px;
}

td
{
    padding:12px;
}

input[type=text]
{
    width:100%;
    padding:8px;
    border:2px solid #7B0000;
    border-radius:5px;
    font-size:16px;
}

input[type=submit]
{
    background:#7B0000;
    color:white;
    border:none;
    padding:10px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

input[type=submit]:hover
{
    background:#B22222;
}

</style>

</head>

<body>

<div class="container">

<h1>🔍 Search Student</h1>

<form action="./search" method="post">

<table>

<tr>
<td>Enter Student Name</td>
<td>
<input type="text" name="t1" placeholder="Enter Student Name" required>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Search">
</td>
</tr>

</table>

</form>

</div>

</body>

</html>
